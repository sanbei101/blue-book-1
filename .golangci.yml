# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.jsonschema.json
version: "2"
run:
  tests: false

linters:
  default: standard # 包含 errorcheck, govet, ineffassign, staticcheck, structcheck, unused
  enable:
    - gocritic
    - canonicalheader
    - errorlint
    - perfsprint
    - modernize
    - revive
    - bodyclose
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - opinionated
      disabled-tags:
        - experimental
    revive:
      enable-default-rules: true
      rules:
        - name: unused-parameter
  exclusions:
    paths:
      - "internal/db"
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling

