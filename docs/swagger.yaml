components:
  schemas:
    api.authResponse:
      properties:
        token:
          description: JWT token
          type: string
        user:
          $ref: '#/components/schemas/api.userResponse'
      type: object
    api.authorResponse:
      description: 作者信息
      properties:
        avatar_url:
          description: 头像地址
          type: string
        id:
          description: 用户 ID
          type: string
        username:
          description: 用户名
          type: string
      type: object
    api.commentResponse:
      properties:
        author_avatar:
          description: 作者头像地址
          type: string
        author_username:
          description: 作者用户名
          type: string
        content:
          description: 评论内容
          type: string
        created_at:
          description: 创建时间
          type: string
        id:
          description: 评论 ID
          type: string
        like_count:
          description: 点赞数
          type: integer
        parent_id:
          description: 父评论 ID,顶级评论为 nil
          type: string
        post_id:
          description: 帖子 ID
          type: string
        user_id:
          description: 用户 ID
          type: string
      type: object
    api.createCommentRequest:
      properties:
        content:
          description: 评论内容
          maxLength: 1000
          type: string
        parent_id:
          description: 父评论 ID,如果是顶级评论则为 nil
          type: string
        post_id:
          description: 帖子唯一标识 ID
          type: string
      required:
      - content
      - post_id
      type: object
    api.createCommentResponse:
      properties:
        id:
          description: 评论 ID
          type: string
      type: object
    api.createMediaItem:
      properties:
        media_type:
          description: 媒体类型 (image/video)
          enum:
          - image
          - video
          type: string
        media_url:
          description: 媒体 URL
          type: string
        sort_order:
          description: 排序序号
          type: integer
      required:
      - media_type
      - media_url
      type: object
    api.createPostRequest:
      properties:
        content:
          description: 帖子内容
          type: string
        media:
          description: 媒体列表
          items:
            $ref: '#/components/schemas/api.createMediaItem'
          type: array
          uniqueItems: false
        title:
          description: 帖子标题
          maxLength: 200
          type: string
      required:
      - content
      - title
      type: object
    api.createPostResponse:
      properties:
        id:
          description: 帖子 ID
          type: string
      type: object
    api.followResponse:
      properties:
        ok:
          description: 操作是否成功
          type: boolean
      type: object
    api.followUserResponse:
      properties:
        avatar_url:
          description: 头像地址
          type: string
        bio:
          description: 个人简介
          type: string
        id:
          description: 用户 ID
          type: string
        username:
          description: 用户名
          type: string
      type: object
    api.getPostsResponse:
      properties:
        author:
          $ref: '#/components/schemas/api.authorResponse'
        content:
          description: 内容
          type: string
        created_at:
          description: 创建时间
          type: string
        id:
          description: 帖子 ID
          type: string
        media:
          description: 媒体列表
          items:
            $ref: '#/components/schemas/api.mediaResponse'
          type: array
          uniqueItems: false
        title:
          description: 标题
          type: string
        view_count:
          description: 浏览量
          type: integer
      type: object
    api.listPostsItemResponse:
      properties:
        author:
          $ref: '#/components/schemas/api.authorResponse'
        content:
          description: 内容
          type: string
        cover_url:
          description: 封面 URL
          type: string
        created_at:
          description: 创建时间
          type: string
        id:
          description: 帖子 ID
          type: string
        title:
          description: 标题
          type: string
        view_count:
          description: 浏览量
          type: integer
      type: object
    api.loginRequest:
      properties:
        password:
          description: 密码
          type: string
        username:
          description: 用户名
          type: string
      required:
      - password
      - username
      type: object
    api.mediaResponse:
      properties:
        id:
          description: 媒体 ID
          type: string
        media_type:
          description: 媒体类型
          type: string
        media_url:
          description: 媒体 URL
          type: string
        sort_order:
          description: 排序序号
          type: integer
      type: object
    api.registerRequest:
      properties:
        password:
          description: 密码
          maxLength: 128
          minLength: 6
          type: string
        username:
          description: 用户名
          maxLength: 32
          minLength: 3
          type: string
      required:
      - password
      - username
      type: object
    api.toggleLikeRequest:
      properties:
        target_id:
          description: 目标 ID (帖子 ID 或 评论 ID)
          type: string
        target_type:
          description: 目标类型 (1=帖子, 2=评论)
          enum:
          - 1
          - 2
          type: integer
      required:
      - target_id
      - target_type
      type: object
    api.toggleLikeResponse:
      properties:
        ok:
          description: 是否点赞成功
          type: boolean
      type: object
    api.updateProfileRequest:
      properties:
        avatar_url:
          description: 头像 URL
          type: string
        bio:
          description: 个人简介
          maxLength: 200
          type: string
        username:
          description: 用户名
          maxLength: 32
          minLength: 3
          type: string
      required:
      - username
      type: object
    api.userResponse:
      description: 用户信息
      properties:
        avatar_url:
          description: 头像地址
          type: string
        bio:
          description: 个人简介
          type: string
        id:
          description: 用户 ID
          type: string
        username:
          description: 用户名
          type: string
      type: object
    render.Response-api_authResponse:
      properties:
        code:
          type: integer
        data:
          $ref: '#/components/schemas/api.authResponse'
        msg:
          type: string
      type: object
    render.Response-api_createCommentResponse:
      properties:
        code:
          type: integer
        data:
          $ref: '#/components/schemas/api.createCommentResponse'
        msg:
          type: string
      type: object
    render.Response-api_createPostResponse:
      properties:
        code:
          type: integer
        data:
          $ref: '#/components/schemas/api.createPostResponse'
        msg:
          type: string
      type: object
    render.Response-api_followResponse:
      properties:
        code:
          type: integer
        data:
          $ref: '#/components/schemas/api.followResponse'
        msg:
          type: string
      type: object
    render.Response-api_getPostsResponse:
      properties:
        code:
          type: integer
        data:
          $ref: '#/components/schemas/api.getPostsResponse'
        msg:
          type: string
      type: object
    render.Response-api_toggleLikeResponse:
      properties:
        code:
          type: integer
        data:
          $ref: '#/components/schemas/api.toggleLikeResponse'
        msg:
          type: string
      type: object
    render.Response-api_userResponse:
      properties:
        code:
          type: integer
        data:
          $ref: '#/components/schemas/api.userResponse'
        msg:
          type: string
      type: object
    render.Response-array_api_commentResponse:
      properties:
        code:
          type: integer
        data:
          items:
            $ref: '#/components/schemas/api.commentResponse'
          type: array
          uniqueItems: false
        msg:
          type: string
      type: object
    render.Response-array_api_followUserResponse:
      properties:
        code:
          type: integer
        data:
          items:
            $ref: '#/components/schemas/api.followUserResponse'
          type: array
          uniqueItems: false
        msg:
          type: string
      type: object
    render.Response-array_api_listPostsItemResponse:
      properties:
        code:
          type: integer
        data:
          items:
            $ref: '#/components/schemas/api.listPostsItemResponse'
          type: array
          uniqueItems: false
        msg:
          type: string
      type: object
    render.ResponseWithoutData:
      properties:
        code:
          type: integer
        msg:
          type: string
      type: object
    render.errorResponse:
      properties:
        code:
          type: integer
        msg:
          type: string
      type: object
  securitySchemes:
    BearerAuth:
      scheme: bearer
      type: http
externalDocs:
  description: ""
  url: ""
info:
  description: 小蓝书后端接口文档
  title: 小蓝书 API
  version: "1.0"
openapi: 3.1.0
paths:
  /comments:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/api.createCommentRequest'
              description: 评论内容
              summary: body
        description: 评论内容
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.Response-api_createCommentResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 创建评论
      tags:
      - comments
  /likes:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/api.toggleLikeRequest'
              description: 点赞信息
              summary: body
        description: 点赞信息
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.Response-api_toggleLikeResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 切换点赞状态
      tags:
      - likes
  /posts:
    get:
      parameters:
      - description: 页码
        in: query
        name: page
        schema:
          default: 1
          type: integer
      - description: 每页数量
        in: query
        name: page_size
        schema:
          default: 20
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.Response-array_api_listPostsItemResponse'
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Internal Server Error
      summary: 获取帖子列表
      tags:
      - posts
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/api.createPostRequest'
              description: 帖子内容
              summary: body
        description: 帖子内容
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.Response-api_createPostResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 创建帖子
      tags:
      - posts
  /posts/{id}:
    delete:
      parameters:
      - description: 帖子 ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "204":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.ResponseWithoutData'
          description: No Content
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 删除帖子
      tags:
      - posts
    get:
      parameters:
      - description: 帖子 ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.Response-api_getPostsResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Not Found
      summary: 获取帖子详情
      tags:
      - posts
  /posts/{id}/comments:
    get:
      parameters:
      - description: 帖子 ID
        in: query
        name: post_id
        required: true
        schema:
          type: string
      - description: 页码
        in: query
        name: page
        schema:
          default: 1
          type: integer
      - description: 每页数量
        in: query
        name: page_size
        schema:
          default: 20
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.Response-array_api_commentResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Internal Server Error
      summary: 获取帖子评论列表
      tags:
      - comments
  /posts/user/{userID}:
    get:
      parameters:
      - description: 用户 ID
        in: path
        name: userID
        required: true
        schema:
          type: string
      - description: 页码
        in: query
        name: page
        schema:
          default: 1
          type: integer
      - description: 每页数量
        in: query
        name: page_size
        schema:
          default: 20
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.Response-array_api_listPostsItemResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Internal Server Error
      summary: 获取指定用户的帖子列表
      tags:
      - posts
  /users/{id}:
    get:
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.Response-api_userResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Not Found
      summary: 获取用户资料
      tags:
      - users
  /users/{id}/follow:
    delete:
      parameters:
      - description: 目标用户 ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.Response-api_followResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 取消关注
      tags:
      - follows
    post:
      parameters:
      - description: 目标用户 ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.Response-api_followResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 关注用户
      tags:
      - follows
  /users/{id}/followers:
    get:
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        schema:
          type: string
      - description: 页码
        in: query
        name: page
        schema:
          default: 1
          type: integer
      - description: 每页数量
        in: query
        name: page_size
        schema:
          default: 20
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.Response-array_api_followUserResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Internal Server Error
      summary: 获取粉丝列表
      tags:
      - follows
  /users/{id}/following:
    get:
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        schema:
          type: string
      - description: 页码
        in: query
        name: page
        schema:
          default: 1
          type: integer
      - description: 每页数量
        in: query
        name: page_size
        schema:
          default: 20
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.Response-array_api_followUserResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Internal Server Error
      summary: 获取关注列表
      tags:
      - follows
  /users/login:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/api.loginRequest'
              description: 登录信息
              summary: body
        description: 登录信息
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.Response-api_authResponse'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Internal Server Error
      summary: 用户登录
      tags:
      - users
  /users/profile:
    put:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/api.updateProfileRequest'
              description: 更新信息
              summary: body
        description: 更新信息
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.Response-api_userResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: 更新用户资料
      tags:
      - users
  /users/register:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/api.registerRequest'
              description: 注册信息
              summary: body
        description: 注册信息
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.Response-api_authResponse'
          description: OK
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Conflict
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/render.errorResponse'
          description: Internal Server Error
      summary: 用户注册
      tags:
      - users
servers:
- description: 本地开发环境
  url: http://localhost:8080/api/v1
