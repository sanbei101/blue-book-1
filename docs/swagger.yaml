basePath: /api/v1
consumes:
- application/json
definitions:
  api.authResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/api.userResponse'
    type: object
  api.authorResponse:
    properties:
      avatar_url:
        type: string
      id:
        type: string
      username:
        type: string
    type: object
  api.commentResponse:
    properties:
      author_avatar:
        type: string
      author_username:
        type: string
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      like_count:
        type: integer
      parent_id:
        type: string
      post_id:
        type: string
      user_id:
        type: string
    type: object
  api.createCommentRequest:
    properties:
      content:
        maxLength: 1000
        type: string
      parent_id:
        type: string
      post_id:
        type: string
    required:
    - content
    - post_id
    type: object
  api.createCommentResponse:
    properties:
      id:
        type: string
    type: object
  api.createMediaItem:
    properties:
      media_type:
        enum:
        - image
        - video
        type: string
      media_url:
        type: string
      sort_order:
        type: integer
    required:
    - media_type
    - media_url
    type: object
  api.createPostRequest:
    properties:
      content:
        type: string
      media:
        items:
          $ref: '#/definitions/api.createMediaItem'
        type: array
      title:
        maxLength: 200
        type: string
    required:
    - content
    - title
    type: object
  api.createPostResponse:
    properties:
      id:
        type: string
    type: object
  api.followResponse:
    properties:
      ok:
        type: boolean
    type: object
  api.followUserResponse:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      id:
        type: string
      username:
        type: string
    type: object
  api.getPostsResponse:
    properties:
      author:
        $ref: '#/definitions/api.authorResponse'
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      media:
        items:
          $ref: '#/definitions/api.mediaResponse'
        type: array
      title:
        type: string
      view_count:
        type: integer
    type: object
  api.listPostsItemResponse:
    properties:
      author:
        $ref: '#/definitions/api.authorResponse'
      content:
        type: string
      cover_url:
        type: string
      created_at:
        type: string
      id:
        type: string
      title:
        type: string
      view_count:
        type: integer
    type: object
  api.loginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  api.mediaResponse:
    properties:
      id:
        type: string
      media_type:
        type: string
      media_url:
        type: string
      sort_order:
        type: integer
    type: object
  api.registerRequest:
    properties:
      password:
        maxLength: 128
        minLength: 6
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  api.toggleLikeRequest:
    properties:
      target_id:
        type: string
      target_type:
        enum:
        - 1
        - 2
        type: integer
    required:
    - target_id
    - target_type
    type: object
  api.toggleLikeResponse:
    properties:
      ok:
        type: boolean
    type: object
  api.updateProfileRequest:
    properties:
      avatar_url:
        type: string
      bio:
        maxLength: 200
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - username
    type: object
  api.userResponse:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      id:
        type: string
      username:
        type: string
    type: object
  render.Response-api_authResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/api.authResponse'
      msg:
        type: string
    type: object
  render.Response-api_createCommentResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/api.createCommentResponse'
      msg:
        type: string
    type: object
  render.Response-api_createPostResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/api.createPostResponse'
      msg:
        type: string
    type: object
  render.Response-api_followResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/api.followResponse'
      msg:
        type: string
    type: object
  render.Response-api_getPostsResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/api.getPostsResponse'
      msg:
        type: string
    type: object
  render.Response-api_toggleLikeResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/api.toggleLikeResponse'
      msg:
        type: string
    type: object
  render.Response-api_userResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/api.userResponse'
      msg:
        type: string
    type: object
  render.Response-array_api_commentResponse:
    properties:
      code:
        type: integer
      data:
        items:
          $ref: '#/definitions/api.commentResponse'
        type: array
      msg:
        type: string
    type: object
  render.Response-array_api_followUserResponse:
    properties:
      code:
        type: integer
      data:
        items:
          $ref: '#/definitions/api.followUserResponse'
        type: array
      msg:
        type: string
    type: object
  render.Response-array_api_listPostsItemResponse:
    properties:
      code:
        type: integer
      data:
        items:
          $ref: '#/definitions/api.listPostsItemResponse'
        type: array
      msg:
        type: string
    type: object
  render.ResponseWithoutData:
    properties:
      code:
        type: integer
      msg:
        type: string
    type: object
  render.errorResponse:
    properties:
      code:
        type: integer
      msg:
        type: string
    type: object
info:
  contact: {}
  description: 小蓝书后端接口文档
  title: 小蓝书 API
  version: "1.0"
paths:
  /comments:
    post:
      parameters:
      - description: 评论内容
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.createCommentRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/render.Response-api_createCommentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/render.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/render.errorResponse'
      security:
      - BearerAuth: []
      summary: 创建评论
      tags:
      - comments
  /likes:
    post:
      parameters:
      - description: 点赞信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.toggleLikeRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/render.Response-api_toggleLikeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/render.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/render.errorResponse'
      security:
      - BearerAuth: []
      summary: 切换点赞状态
      tags:
      - likes
  /posts:
    get:
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/render.Response-array_api_listPostsItemResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/render.errorResponse'
      summary: 获取帖子列表
      tags:
      - posts
    post:
      parameters:
      - description: 帖子内容
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.createPostRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/render.Response-api_createPostResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/render.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/render.errorResponse'
      security:
      - BearerAuth: []
      summary: 创建帖子
      tags:
      - posts
  /posts/{id}:
    delete:
      parameters:
      - description: 帖子 ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
          schema:
            $ref: '#/definitions/render.ResponseWithoutData'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/render.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/render.errorResponse'
      security:
      - BearerAuth: []
      summary: 删除帖子
      tags:
      - posts
    get:
      parameters:
      - description: 帖子 ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/render.Response-api_getPostsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/render.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/render.errorResponse'
      summary: 获取帖子详情
      tags:
      - posts
  /posts/{id}/comments:
    get:
      parameters:
      - description: 帖子 ID
        in: query
        name: post_id
        required: true
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/render.Response-array_api_commentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/render.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/render.errorResponse'
      summary: 获取帖子评论列表
      tags:
      - comments
  /posts/user/{userID}:
    get:
      parameters:
      - description: 用户 ID
        in: path
        name: userID
        required: true
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/render.Response-array_api_listPostsItemResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/render.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/render.errorResponse'
      summary: 获取指定用户的帖子列表
      tags:
      - posts
  /users/{id}:
    get:
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/render.Response-api_userResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/render.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/render.errorResponse'
      summary: 获取用户资料
      tags:
      - users
  /users/{id}/follow:
    delete:
      parameters:
      - description: 目标用户 ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/render.Response-api_followResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/render.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/render.errorResponse'
      security:
      - BearerAuth: []
      summary: 取消关注
      tags:
      - follows
    post:
      parameters:
      - description: 目标用户 ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/render.Response-api_followResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/render.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/render.errorResponse'
      security:
      - BearerAuth: []
      summary: 关注用户
      tags:
      - follows
  /users/{id}/followers:
    get:
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/render.Response-array_api_followUserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/render.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/render.errorResponse'
      summary: 获取粉丝列表
      tags:
      - follows
  /users/{id}/following:
    get:
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: page_size
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/render.Response-array_api_followUserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/render.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/render.errorResponse'
      summary: 获取关注列表
      tags:
      - follows
  /users/login:
    post:
      parameters:
      - description: 登录信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.loginRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/render.Response-api_authResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/render.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/render.errorResponse'
      summary: 用户登录
      tags:
      - users
  /users/profile:
    put:
      parameters:
      - description: 更新信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.updateProfileRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/render.Response-api_userResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/render.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/render.errorResponse'
      security:
      - BearerAuth: []
      summary: 更新用户资料
      tags:
      - users
  /users/register:
    post:
      parameters:
      - description: 注册信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.registerRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/render.Response-api_authResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/render.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/render.errorResponse'
      summary: 用户注册
      tags:
      - users
produces:
- application/json
schemes:
- http
swagger: "2.0"
